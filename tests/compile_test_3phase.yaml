# 3-phase variant of compile_test.yaml — exercises the {l1,l2,l3} dict
# form for voltage/current and the `phases:` list. Catches regressions
# in the polymorphic schema validator (`_voltage_or_current` in
# __init__.py) that the single-phase test wouldn't see.

substitutions:
  device_name: rippleon-ci-3p
  friendly_name: Rippleon CI 3-phase

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.f_cpu: 120000000L
    board_build.bkcrypt_coeffs: "00000000000000000000000000000000"

bk72xx:
  board: generic-bk7231n-qfn32-tuya

logger:
  level: DEBUG

external_components:
  - source:
      type: local
      path: ../components
    components: [ocpp]

# Stub measurand sensors — three legs of voltage and current plus
# scalar power/energy. Templates are enough for compile-time validation
# of the polymorphic schema.
sensor:
  - platform: template
    name: "V L1"
    id: v_l1
    lambda: 'return 230.0;'
    update_interval: 60s
  - platform: template
    name: "V L2"
    id: v_l2
    lambda: 'return 230.0;'
    update_interval: 60s
  - platform: template
    name: "V L3"
    id: v_l3
    lambda: 'return 230.0;'
    update_interval: 60s
  - platform: template
    name: "I L1"
    id: i_l1
    lambda: 'return 0.0;'
    update_interval: 60s
  - platform: template
    name: "I L2"
    id: i_l2
    lambda: 'return 0.0;'
    update_interval: 60s
  - platform: template
    name: "I L3"
    id: i_l3
    lambda: 'return 0.0;'
    update_interval: 60s
  - platform: template
    name: "Total Power"
    id: total_power
    lambda: 'return 0.0;'
    update_interval: 60s
  - platform: template
    name: "Total Energy"
    id: total_energy
    lambda: 'return 0.0;'
    update_interval: 60s

number:
  - platform: template
    name: "Max Current"
    id: max_current
    optimistic: true
    min_value: 6.0
    max_value: 32.0
    step: 1.0

api:
ota:
  - platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${device_name}-ap

ocpp:
  id: ocpp_cp
  csms_url: !secret ocpp_csms_url
  charge_point_id: !secret ocpp_charge_point_id
  vendor: Test
  model: 3p
  phases: [L1, L2, L3]
  nominal_voltage: 230.0
  phase_switching_supported: true
  meter_values:
    voltage:
      l1: v_l1
      l2: v_l2
      l3: v_l3
    current:
      l1: i_l1
      l2: i_l2
      l3: i_l3
    power: total_power
    energy: total_energy
    current_offered: max_current
